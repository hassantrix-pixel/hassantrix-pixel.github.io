<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث لعبة تريكس - Trix Update</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            direction: rtl;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 450px;
            width: 100%;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 70px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        h1 {
            color: #1a237e;
            margin-bottom: 15px;
            font-size: 32px;
            font-weight: 800;
        }
        
        .version-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 18px;
            margin: 20px 0;
            border-right: 5px solid #4285f4;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .version-number {
            color: #d32f2f;
            font-weight: bold;
            font-size: 20px;
        }
        
        .download-section {
            margin: 30px 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .download-btn {
            color: white;
            padding: 20px 30px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* ستيل جوجل بلاي - الموصى به */
        .play-btn {
            background: linear-gradient(135deg, #4285f4, #34a853, #fbbc05, #ea4335);
            background-size: 200% auto;
            box-shadow: 0 10px 20px rgba(66, 133, 244, 0.3);
        }

        .play-btn:hover {
            background-position: right center;
            transform: scale(1.03);
            box-shadow: 0 15px 30px rgba(66, 133, 244, 0.4);
        }

        /* ستيل الرابط المباشر */
        .direct-btn {
            background: linear-gradient(135deg, #2c3e50, #4ca1af);
            box-shadow: 0 10px 20px rgba(44, 62, 80, 0.2);
        }

        .direct-btn:hover {
            background: linear-gradient(135deg, #4ca1af, #2c3e50);
            transform: scale(1.03);
        }
        
        .recommended-badge {
            background: #ffeb3b;
            color: #000;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 800;
            position: absolute;
            top: -10px;
            right: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            animation: shine 2s infinite;
        }

        @keyframes shine {
            0% { opacity: 0.8; }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.8; }
        }
        
        .footer-note {
            margin-top: 25px;
            color: #5f6368;
            font-size: 14px;
            line-height: 1.6;
            background: rgba(0,0,0,0.03);
            padding: 15px;
            border-radius: 12px;
        }

        .icon {
            margin-left: 10px;
            font-size: 22px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <div class="logo">🃏</div>
        </div>
        <h1>تحديث تريكس الجديد</h1>
        
        <div class="version-info">
            <p>رقم الإصدار: <span class="version-number">10.8.1</span></p>
            <p style="color: #666; margin-top: 5px;">تحديث أمني وتحسينات في الأداء</p>
        </div>
        
        <div class="download-section">
            <a href="https://play.google.com/store/apps/details?id=com.reignmire.trix" 
               class="download-btn play-btn" 
               target="_blank">
                <span class="recommended-badge">موصى به ⭐</span>
                <span class="icon">🏪</span>
                تحديث من Google Play
            </a>
          
            <a href="https://github.com/hassantrix-pixel/hassantrix-pixel.github.io/releases/latest/download/Trix.apk" 
               class="download-btn direct-btn" 
               target="_blank">
                <span class="icon">🚀</span>
                تحميل برابط مباشر (APK)
            </a>
        </div>
        
        <div class="footer-note">
            <strong>💡 نصيحة:</strong> يفضل التحديث من المتجر لضمان الحصول على الميزات التلقائية وحماية بياناتك.
            <br>
            <span style="display: block; margin-top: 10px; font-weight: bold; color: #1a237e;">REIGNMIRE LLC © 2026</span>
        </div>
    </div>
</body>
</html>
