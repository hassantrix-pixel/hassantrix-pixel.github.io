<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث لعبة تريكس</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .download-btn {
            background: linear-gradient(45deg, #FF6B6B, #4ECDC4);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 10px 0;
            transition: all 0.3s ease;
        }
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .version-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎮</div>
        <h1>تحديث لعبة تريكس</h1>
        
        <div class="version-info">
            <h3>📱 الإصدار الجديد: 3.0</h3>
            <p>✨ ميزات جديدة وإصلاحات هامة</p>
        </div>
        
        <a href="https://drive.google.com/uc?export=download&id=1dH3zDZ5aGJtZCGm48Ova43lqdilp8Eu_" 
           class="download-btn" 
           target="_blank">
            ⬇️ تحديث الآن
        </a>
        
        <a href="https://play.google.com/store/apps/details?id=com.hhassn.trix" 
           class="download-btn" 
           target="_blank">
            🏪 تحديث من Google Play
        </a>
        
        <p style="margin-top: 30px; color: #666;">
            شكراً لاستخدامك لعبة تريكس! 🎯
        </p>
    </div>
</body>
</html>
