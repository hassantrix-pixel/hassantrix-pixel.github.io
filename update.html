<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث لعبة تريكس</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            direction: rtl;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 420px;
            width: 100%;
            backdrop-filter: blur(10px);
            margin: 0 auto;
            position: relative;
        }
        .logo {
            font-size: 64px;
            margin-bottom: 25px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
            60% {
                transform: translateY(-5px);
            }
        }
        
        h1 {
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 28px;
            font-weight: 700;
        }
        
        .download-section {
            margin: 30px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .download-btn {
            color: white;
            padding: 18px 35px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 12px 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
            max-width: 280px;
            position: relative;
            overflow: hidden;
            text-align: center;
        }
        
        .download-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        .download-btn:hover::before {
            left: 100%;
        }
        
        .download-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
        
        .download-btn:active {
            transform: translateY(-1px) scale(0.98);
        }
        
        .github-btn {
            background: linear-gradient(135deg, #24292e, #586069);
            box-shadow: 0 8px 25px rgba(36, 41, 46, 0.3);
        }
        
        .github-btn:hover {
            background: linear-gradient(135deg, #586069, #24292e);
            box-shadow: 0 12px 35px rgba(36, 41, 46, 0.4);
        }
        
        .drive-btn {
            background: linear-gradient(135deg, #4285f4, #34a853);
            box-shadow: 0 8px 25px rgba(66, 133, 244, 0.3);
        }
        
        .drive-btn:hover {
            background: linear-gradient(135deg, #34a853, #4285f4);
            box-shadow: 0 12px 35px rgba(66, 133, 244, 0.4);
        }
        
        .play-btn {
            background: linear-gradient(135deg, #607d8b, #455a64);
            box-shadow: 0 8px 25px rgba(96, 125, 139, 0.3);
        }
        
        .play-btn:hover {
            background: linear-gradient(135deg, #455a64, #607d8b);
            box-shadow: 0 12px 35px rgba(96, 125, 139, 0.4);
        }
        
        .version-info {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            padding: 25px;
            border-radius: 15px;
            margin: 25px 0;
            border: 1px solid #dee2e6;
            position: relative;
        }
        
        .version-info::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #667eea, #764ba2, #f093fb, #f5576c);
            border-radius: 15px;
            z-index: -1;
            opacity: 0.3;
        }
        
        .recommended {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 10px;
            display: inline-block;
            animation: pulse 2s infinite;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
            position: absolute;
            top: -8px;
            left: -8px;
            z-index: 10;
        }
        
        @keyframes pulse {
            0% {
                box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
            }
            50% {
                box-shadow: 0 4px 25px rgba(255, 107, 107, 0.6);
            }
            100% {
                box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎮</div>
        <h1>تحديث لعبة تريكس</h1>
        
        <div class="version-info">
            <h3>📱 الإصدار الجديد: 3.0</h3>
            <p>✨ ميزات جديدة وإصلاحات هامة</p>
        </div>
        
        <div class="download-section">
            <a href="https://github.com/hassantrix-pixel/hassantrix-pixel.github.io/releases/download/v1.0.0/Trix.apk" 
               class="download-btn github-btn" 
               target="_blank">
                <span class="recommended">الأفضل</span>
                ⬇️ تحديث الآن
            </a>
            
            <a href="https://drive.google.com/uc?export=download&id=1dH3zDZ5aGJtZCGm48Ova43lqdilp8Eu_" 
               class="download-btn drive-btn" 
               target="_blank">
                📁 تحديث من Google Drive
            </a>
            
            <a href="https://github.com/hassantrix-pixel/hassantrix-pixel.github.io/releases/download/v1.0.0/Trix.apk" 
               class="download-btn play-btn" 
               target="_blank">
                🏪 تحديث قريبا  من Google Play
            </a>
        </div>
        
        <p style="margin-top: 30px; color: #666; font-size: 14px; line-height: 1.6;">
            <strong>💡 ملاحظة:</strong> التحميل من GitHub هو الخيار الأفضل والأسرع<br>
            شكراً لاستخدامك لعبة تريكس! 🎯
        </p>
    </div>
</body>
</html>
